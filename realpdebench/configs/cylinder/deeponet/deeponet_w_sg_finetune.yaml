exp_name: deeponet_cylinder
gpu: 0
seed: 0
results_path: /raid/work/sandbox/RealPDEBench/models/

# data
dataset_name: cylinder
dataset_root: /raid/work/sandbox/RealPDEBench/data/
num_workers: 12   
normalizer: gaussian   # none, gaussian, range
in_step: 1
out_step: 1

# data parameters for training
mask_prob: 0.1
noise_scale: 0.1 # only applicable for numerical data

# model
model_name: deeponet
checkpoint_path: 
  /raid/work/sandbox/RealPDEBench/models/deeponet/deeponet_cylinder_numerical_False/2026-07-17_15-46-38/model_0400.pth
p: 128
dropout_rate: 0.1

# training
is_use_tb: true
scheduler: cosine # step, cosine
step_size: 1000 # only applicable for step scheduler
num_update: 1000
train_batch_size: 32
test_batch_size: 64
lr: 0.0001
clip_grad_norm: 0.

# evaluation
N_autoregressive: 1000
N_plot: 1
probe_diagnostic: True
N_plot_probe: 12

